# Deploy production on push to main.
# 1. Create a NEW Vercel project (no reuse of an old one): from this folder run
#    npx vercel link
#    Choose "Link to existing project" → "Create new project", or create the project
#    in the Vercel dashboard first, then link.
# 2. From .vercel/project.json copy orgId → GitHub secret VERCEL_ORG_ID, projectId → VERCEL_PROJECT_ID.
# 3. Add VERCEL_TOKEN from https://vercel.com/account/tokens
name: Deploy to Vercel
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
